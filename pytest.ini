[pytest]
markers =
    slow: long-running tests (disabled by default unless explicitly enabled)
    scope_unit: local contract tests
    scope_integration: cross-module workflow tests
    scope_stability: numerical and deterministic stability tests
    level_smoke: fast sanity coverage
    level_basic: normal development coverage
    level_deep: expensive, high-rigor coverage
filterwarnings =
    ignore:\[Errno 13\] Permission denied\.\s+joblib will operate in serial mode:UserWarning:joblib\._multiprocessing_helpers
    ignore:p-value capped.*:UserWarning
